<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 | 机场控制台</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="login">
    <main class="login-shell">
      <section class="login-card">
        <div class="login-side">
          <div class="login-brand">
            <div class="login-brand-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path
                  d="M4 12.5 9.2 6a2.2 2.2 0 0 1 3.44 0l1.2 1.48 1.77-2.2a2.2 2.2 0 0 1 3.43 0L20 6.4v11.1a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"
                  fill="currentColor"
                  opacity=".18"
                />
                <path
                  d="m6.6 14.2 3.14-3.9a1.2 1.2 0 0 1 1.87 0l1.85 2.27 2.8-3.48"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.8"
                />
              </svg>
            </div>
            <div>
              <p class="login-kicker">Control Plane</p>
              <h1>登录机场控制台</h1>
              <p class="login-intro">
                集中管理节点、批量下发系统模板、执行运维动作，并在登录后自动回到你刚才的页面。
              </p>
            </div>
          </div>

          <div class="login-side-grid">
            <article class="login-side-card">
              <span class="login-side-label">统一入口</span>
              <strong>节点纳管、巡检、模板下发</strong>
              <p>所有控制动作仍走同一套控制面，不影响节点 bootstrap 链路。</p>
            </article>
            <article class="login-side-card">
              <span class="login-side-label">会话保护</span>
              <strong>401 自动回跳登录页</strong>
              <p>登录失效后自动带上 `next` 参数，回到原来的节点详情或终端页面。</p>
            </article>
            <article class="login-side-card">
              <span class="login-side-label">轻量交互</span>
              <strong>适合运维控制台的高密度界面</strong>
              <p>保留清晰信息层级，不把表单和说明做得过大、过重。</p>
            </article>
          </div>
        </div>

        <section class="login-panel">
          <div class="login-panel-head">
            <span class="eyebrow">管理员登录</span>
            <h2>继续进入控制台</h2>
            <p>登录后返回：<strong id="login-next-value">总览</strong></p>
          </div>

          <form id="login-form" class="login-form" novalidate>
            <label class="login-field">
              <span>账号</span>
              <input
                type="text"
                name="username"
                autocomplete="username"
                placeholder="请输入管理员账号"
                required
              />
            </label>

            <label class="login-field">
              <span>密码</span>
              <input
                type="password"
                name="password"
                autocomplete="current-password"
                placeholder="请输入登录密码"
                required
              />
            </label>

            <button class="button primary login-submit" id="login-submit" type="submit">
              登录控制台
            </button>
            <p class="login-message" id="login-message" aria-live="polite"></p>
          </form>

          <div class="login-panel-foot">
            <div class="login-foot-item">
              <span>登录态</span>
              <strong>同域 Cookie 会话</strong>
            </div>
            <div class="login-foot-item">
              <span>返回策略</span>
              <strong>按 next 回到原页面</strong>
            </div>
          </div>
        </section>
      </section>
    </main>
    <script type="module" src="/js/auth/login-page.js"></script>
  </body>
</html>
